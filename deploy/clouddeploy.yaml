apiVersion: deploy.cloud.google.com/v1
kind: DeliveryPipeline
metadata:
  name: hello-canary-pipeline
description: hello-canary dev -> stg (uat/prd to come)
serialPipeline:
  stages:
    - targetId: hello-canary-dev
      profiles: [dev]
      strategy:
        standard: {}
    - targetId: hello-canary-stg
      profiles: [stg]
      strategy:
        canary:
          runtimeConfig:
            cloudRun:
              automaticTrafficControl: true
          canaryDeployment:
            percentages: [25, 75]
            verify: true
    # - targetId: hello-canary-uat
    #   profiles: [uat]
    #   strategy:
    #     canary:
    #       runtimeConfig:
    #         cloudRun:
    #           automaticTrafficControl: true
    #       canaryDeployment:
    #         percentages: [25, 75]
    #         verify: false
    # - targetId: hello-canary-prd
    #   profiles: [prd]
    #   strategy:
    #     canary:
    #       runtimeConfig:
    #         cloudRun:
    #           automaticTrafficControl: true
    #       canaryDeployment:
    #         percentages: [25, 50, 75]
    #         verify: false
---
apiVersion: deploy.cloud.google.com/v1
kind: Target
metadata:
  name: hello-canary-dev
description: hello-canary — dev (auto)
executionConfigs:
  - usages: [RENDER, DEPLOY]
    serviceAccount: hello-canary-sa@humblebundle-stg.iam.gserviceaccount.com
run:
  location: projects/humblebundle-stg/locations/us-central1
---
apiVersion: deploy.cloud.google.com/v1
kind: Target
metadata:
  name: hello-canary-stg
description: hello-canary — stg (approval required)
requireApproval: true
executionConfigs:
  # VERIFY usage so the canary verify phase runs as the execution SA (which has
  # secretAccessor on the Datadog keys + can list Cloud Run revisions).
  - usages: [RENDER, DEPLOY, VERIFY]
    serviceAccount: hello-canary-sa@humblebundle-stg.iam.gserviceaccount.com
run:
  location: projects/humblebundle-stg/locations/us-central1
---
# Auto-advance canary phases; roll the rollout back on a failed phase (e.g. a
# verify breach). Without this the rollout pauses for a manual advance and a failed
# verify just stalls instead of reverting. Mirrors the A1 dev-pipeline automation
# (HBNXT-2447). NOTE: hello-canary-sa is a sandbox SA — swap for a real deploy SA at
# cutover (HBNXT-359).
apiVersion: deploy.cloud.google.com/v1
kind: Automation
metadata:
  name: hello-canary-pipeline/canary-auto
description: Auto-advance canary phases; roll back on a failed phase.
serviceAccount: hello-canary-sa@humblebundle-stg.iam.gserviceaccount.com
selector:
  targets:
    - id: hello-canary-stg
rules:
  - advanceRolloutRule:
      id: auto-advance
  - repairRolloutRule:
      id: auto-rollback
      repairPhases:
        - rollback: {}
